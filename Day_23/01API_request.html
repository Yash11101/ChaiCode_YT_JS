<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #212121;color: #fff;">
    <!-- 0	UNSENT	Client has been created. open() not called <br>
    1	OPENED	open() has been called. <br>
    2	HEADERS_RECEIVED	send() has been called, and headers and status are available. <br>
    3	LOADING	Downloading; responseText holds partial data. <br>
    4	DONE	The operation is complete. <br> -->

    <table border="black">
        <tr>
            <th>Value</th>
            <th>State</th>
            <th>Description</th>
        </tr>
        <tr>
            <td>0</td>
            <td>UNSENT</td>
            <td>Client has been created. open() not called</td>
        </tr>
        <tr>
            <td>1</td>
            <td>OPENED</td>
            <td>open() has been called.</td>
        </tr>
        <tr>
            <td>2</td>
            <td>HEADERS_RECEIVED</td>
            <td>send() has been called, and headers and status are available.</td>
        </tr>
        <tr>
            <td>3</td>
            <td>LOADING</td>
            <td>Downloading; responseText holds partial data.</td>
        </tr>
        <tr>
            <td>4</td>
            <td>DONE</td>
            <td>The operation is complete.</td>
        </tr>
    </table>
    <br>
    <br>

    <div class="avatar"></div>
    <div class="userName"></div>
    <div class="publicRepos"></div>
</body>
<script>
    URL="https://api.github.com/users/Yash11101"
    const xhr=new XMLHttpRequest()
    xhr.open("GET",URL)
    xhr.onreadystatechange=function(){
        // console.log(xhr.readyState);
        if(xhr.readyState===4){
        
            const data=JSON.parse(xhr.responseText)

            const avtr=document.querySelector(".avatar")
            const img=document.createElement("img")
            img.src="https://avatars.githubusercontent.com/u/177202327?v=4"
            img.height=200
            avtr.appendChild(img)
            document.body.appendChild(avtr)
            
            const un=document.querySelector(".userName")
            const userName=document.createElement("h4")
            userName.innerText=`UserName: ${data["login"]}`
            un.appendChild(userName)   
            document.body.appendChild(un) 
            
            const pRepos=document.querySelector(".publicRepos")
            const publicRepos=document.createElement("h4")
            publicRepos.innerText=`Number of Public Repos: ${data["public_repos"]}`
            pRepos.appendChild(publicRepos)
            document.body.appendChild(pRepos)

        
            
        }
    }
    xhr.send()
    // console.log(xhr.readyState);
    
    

    
</script>
</html>
